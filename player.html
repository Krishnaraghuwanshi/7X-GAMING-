<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Dashboard | 7X GAMING</title>

<link rel="stylesheet" href="style.css">

<style>

.container{
max-width:700px;
margin:40px auto;
padding:20px;
}

.card{
background:#111827;
border:2px solid cyan;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 0 20px cyan;
}

.card h2{
color:cyan;
margin-bottom:10px;
}

.card p{
margin:10px 0;
font-size:18px;
}

</style>

</head>

<body>

<header>

<div class="logo">
🎮 7X GAMING
</div>

</header>

<div class="container">

<div class="card">

<h2>Player Details</h2>

<p><b>Name :</b> <span id="playerName">Loading...</span></p>

<p><b>Email :</b> <span id="playerEmail">Loading...</span></p>

<p><b>Phone :</b> <span id="playerPhone">Loading...</span></p>

</div>

<div class="card">

<h2>Room Details</h2>

<p><b>Room ID :</b> <span id="roomId">Waiting...</span></p>

<p><b>Password :</b> <span id="roomPassword">Waiting...</span></p>

</div>

<div class="card">

<h2>Tournament</h2>

<p>⏰ Time : 9:00 PM - 11:00 PM</p>

<p>💰 Entry : ₹20</p>

<p>🎯 ₹5 Per Kill</p>

<p>🏆 Chicken Dinner ₹500</p>

</div>

</div>

<script type="module" src="player.js"></script>

</body>
</html>
